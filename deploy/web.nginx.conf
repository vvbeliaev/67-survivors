# nginx inside the web container. Traefik terminates TLS upstream and routes:
#   Host(67survivors.pereezdvmax.ru)                       → here (static export)
#   Host(67survivors.pereezdvmax.ru) && PathPrefix(/game)  → game container :7777

server {
    listen 80;
    listen [::]:80;

    root /usr/share/nginx/html;
    index index.html;

    # Cross-origin isolation — harmless when thread_support=false in the export,
    # required if it's flipped on later.
    add_header Cross-Origin-Opener-Policy   "same-origin"  always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Game assets (wasm/pck/js) — Godot экспорт не делает hash в имени, поэтому
    # длинный max-age превращается в "клиент 7 дней играет на старой сборке
    # против нового сервера" → SceneReplicationConfig рассинхронизируется,
    # сыпется "ID N not found in cache", "spawner is null". Заставляем браузер
    # ревалидировать по ETag на каждый заход — файл сам по себе кешируется,
    # но при новой сборке тут же подтянется свежий.
    location ~* \.(wasm|pck|js)$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Cross-Origin-Opener-Policy   "same-origin"  always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # Иконки и аудио — версионить не критично, но пусть тоже ревалидируют
    # каждые сутки (компромисс трафик/свежесть).
    location ~* \.(png|svg|ogg|mp3|woff2?)$ {
        try_files $uri =404;
        expires 1d;
        add_header Cache-Control "public, max-age=86400, must-revalidate";
        add_header Cross-Origin-Opener-Policy   "same-origin"  always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    location = /index.html {
        add_header Cache-Control "no-store" always;
        add_header Cross-Origin-Opener-Policy   "same-origin"  always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
